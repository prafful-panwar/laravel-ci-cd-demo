version: '3.8'

services:
    app:
        image: praffulpanwar2016/task-app-ci-cd-demo:latest
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - static_content:/var/www
        depends_on:
            - db
        environment:
            APP_URL: http://localhost:8080
            APP_KEY: base64:2fl+Ktvkfl+Frkxvry1vF+I5/1G5Q/5K5+555555555=
            APP_DEBUG: true
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: task_app_test
            DB_USERNAME: laravel
            DB_PASSWORD: password
        networks:
            - docker-test-network

    web:
        image: praffulpanwar2016/task-app-nginx:latest
        restart: unless-stopped
        ports:
            - '8080:80'
        volumes:
            - static_content:/var/www
        depends_on:
            - app
        networks:
            - docker-test-network

    db:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: task_app_test
            MYSQL_USER: laravel
            MYSQL_PASSWORD: password
            MYSQL_ROOT_PASSWORD: root
        networks:
            - docker-test-network

networks:
    docker-test-network:
        driver: bridge

volumes:
    static_content:
