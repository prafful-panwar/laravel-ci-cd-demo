apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: mysql
    namespace: task-app
spec:
    serviceName: mysql-service
    replicas: 1
    selector:
        matchLabels:
            app: mysql
    template:
        metadata:
            labels:
                app: mysql
        spec:
            containers:
                - name: mysql
                  image: mysql:8.0
                  ports:
                      - containerPort: 3306
                        name: mysql
                  env:
                      - name: MYSQL_ROOT_PASSWORD
                        value: 'root'
                      - name: MYSQL_DATABASE
                        value: 'task-app-ci-cd-demo'
                      - name: MYSQL_USER
                        value: 'laravel'
                      - name: MYSQL_PASSWORD
                        value: 'password'
                  volumeMounts:
                      - name: mysql-data
                        mountPath: /var/lib/mysql
                  resources:
                      requests:
                          memory: '256Mi'
                          cpu: '100m'
                      limits:
                          memory: '512Mi'
                          cpu: '500m'
                  livenessProbe:
                      exec:
                          command:
                              - mysqladmin
                              - ping
                              - -h
                              - localhost
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                  readinessProbe:
                      exec:
                          command:
                              - mysqladmin
                              - ping
                              - -h
                              - localhost
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 5
            volumes:
                - name: mysql-data
                  persistentVolumeClaim:
                      claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
    name: db
    namespace: task-app
spec:
    clusterIP: None
    selector:
        app: mysql
    ports:
        - port: 3306
          targetPort: 3306
