apiVersion: batch/v1
kind: Job
metadata:
    name: laravel-migration
    namespace: task-app
    annotations:
        'helm.sh/hook': pre-install,pre-upgrade
        'helm.sh/hook-weight': '-5'
spec:
    ttlSecondsAfterFinished: 60
    template:
        spec:
            containers:
                - name: artisan-migrate
                  image: praffulpanwar2016/task-app-ci-cd-demo:latest # Will be replaced by CD pipeline
                  command: ['php', 'artisan', 'migrate', '--force']
                  env:
                      - name: DB_CONNECTION
                        value: 'mysql'
                      - name: DB_HOST
                        value: 'db' # Service name in k8s
                      - name: DB_PORT
                        value: '3306'
                      - name: DB_DATABASE
                        value: 'task-app-ci-cd-demo'
                      - name: DB_USERNAME
                        value: 'laravel'
                      - name: DB_PASSWORD
                        value: 'password'
            resources:
                requests:
                    memory: '128Mi'
                    cpu: '100m'
                limits:
                    memory: '256Mi'
                    cpu: '500m'
            restartPolicy: OnFailure
    backoffLimit: 6
