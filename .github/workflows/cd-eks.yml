name: CD - Deploy to EKS

on:
    workflow_run:
        workflows: ['CI - Build and Push Docker Images']
        types:
            - completed

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        permissions:
            contents: read
        concurrency:
            group: ${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true
        environment: production

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Validate AWS credentials and permissions
              run: |
                  echo "🔐 Validating AWS credentials..."

                  # Test AWS connection
                  if ! aws sts get-caller-identity; then
                      echo "❌ Failed to authenticate with AWS. Check your credentials."
                      exit 1
                  fi

                  echo "✅ AWS authentication successful"
                  echo "Account: $(aws sts get-caller-identity --query Account --output text)"
                  echo "User/Role: $(aws sts get-caller-identity --query Arn --output text)"

                  # Test EKS permissions
                  echo ""
                  echo "🔍 Checking EKS permissions..."
                  if ! aws eks describe-cluster --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }} &>/dev/null; then
                      echo "⚠️  Warning: Cannot access EKS cluster. This could be due to:"
                      echo "  - Cluster doesn't exist yet"
                      echo "  - Insufficient IAM permissions"
                      echo "  - Incorrect cluster name or region"
                  else
                      echo "✅ EKS access verified"
                  fi

            - name: Check EKS cluster status
              id: cluster-check
              run: |
                  CLUSTER_STATUS=$(aws eks describe-cluster --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }} --query 'cluster.status' --output text 2>/dev/null || echo "NOT_FOUND")
                  echo "Cluster status: $CLUSTER_STATUS"

                  if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
                      echo "❌ EKS cluster is not ready (status: $CLUSTER_STATUS)"
                      echo "Please wait for cluster creation to complete, then re-run this workflow."
                      exit 1
                  fi

                  echo "✅ EKS cluster is ready"

            - name: Configure kubectl
              run: |
                  echo "⚙️  Configuring kubectl for EKS cluster..."
                  aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}
                  kubectl version --client

                  echo ""
                  echo "🔍 Testing kubectl access to cluster..."
                  if ! kubectl auth can-i get pods -n kube-system 2>/dev/null; then
                      echo ""
                      echo "❌ ERROR: kubectl cannot access the EKS cluster!"
                      echo ""
                      echo "The GitHub Actions IAM user/role needs permission to access this cluster."
                      echo ""
                      echo "To fix this, run these commands locally:"
                      echo ""
                      echo "# 1. Get the IAM ARN that GitHub Actions is using:"
                      echo "IAM_ARN=\"$(aws sts get-caller-identity --query Arn --output text)\""
                      echo "echo \"GitHub Actions IAM ARN: \$IAM_ARN\""
                      echo ""
                      echo "# 2. Add this IAM user/role to your EKS cluster:"
                      echo "eksctl create iamidentitymapping \\"
                      echo "  --cluster ${{ secrets.EKS_CLUSTER_NAME }} \\"
                      echo "  --region ${{ secrets.AWS_REGION }} \\"
                      echo "  --arn \"\$IAM_ARN\" \\"
                      echo "  --group system:masters \\"
                      echo "  --username github-actions"
                      echo ""
                      echo "Or manually edit the aws-auth ConfigMap:"
                      echo "kubectl edit configmap aws-auth -n kube-system"
                      echo ""
                      exit 1
                  fi

                  echo "✅ kubectl access verified!"

            - name: Install AWS EBS CSI Driver (if not exists)
              run: |
                  echo "🔍 Checking for AWS EBS CSI Driver..."

                  if kubectl get deployment ebs-csi-controller -n kube-system &>/dev/null; then
                      echo "✅ EBS CSI Driver already installed"
                  else
                      echo "📦 Installing AWS EBS CSI Driver..."
                      kubectl apply -k "https://github.com/kubernetes-sigs/aws-ebs-csi-driver/deploy/kubernetes/overlays/stable/?ref=release-1.28"
                      
                      echo "⏳ Waiting for CSI driver to be ready..."
                      kubectl wait --for=condition=Available deployment/ebs-csi-controller -n kube-system --timeout=5m
                      
                      echo "✅ EBS CSI Driver installed successfully"
                  fi

            - name: Tag EKS EC2 Instances
              run: |
                  echo "🏷️  Tagging EKS EC2 instances..."

                  # Get all EC2 instances for this EKS cluster
                  INSTANCE_IDS=$(aws ec2 describe-instances \
                    --filters "Name=tag:eks:cluster-name,Values=${{ secrets.EKS_CLUSTER_NAME }}" \
                              "Name=instance-state-name,Values=running" \
                    --query 'Reservations[*].Instances[*].InstanceId' \
                    --output text)

                  if [ -n "$INSTANCE_IDS" ]; then
                      echo "Found instances: $INSTANCE_IDS"
                      
                      # Tag each instance
                      for INSTANCE_ID in $INSTANCE_IDS; do
                          aws ec2 create-tags \
                            --resources $INSTANCE_ID \
                            --tags Key=Name,Value="eks-task-app-node"
                      done
                      
                      echo "✅ Tagged $(echo $INSTANCE_IDS | wc -w) instances with name 'eks-task-app-node'"
                  else
                      echo "ℹ️  No running instances found for cluster"
                  fi

            - name: Deploy to EKS with Zero-Downtime Rolling Update
              env:
                  APP_IMAGE: ${{ secrets.DOCKER_USERNAME }}/task-app-ci-cd-demo:${{ github.sha }}
                  NGINX_IMAGE: ${{ secrets.DOCKER_USERNAME }}/task-app-nginx:${{ github.sha }}
              run: |
                  echo "Deploying new image: ${APP_IMAGE}"

                  # Create namespace if it doesn't exist
                  if ! kubectl get namespace task-app &>/dev/null; then
                      echo "Creating namespace and initial resources..."
                      kubectl apply -f k8s/namespace.yaml
                      kubectl apply -f k8s/nginx-configmap.yaml
                      kubectl apply -f k8s/mysql-pvc.yaml
                      kubectl apply -f k8s/mysql-statefulset.yaml
                      
                      # 1. Wait for MySQL (Critical for first run)
                      echo "⏳ Waiting for MySQL to be ready..."
                      kubectl wait --for=condition=Ready pod -l app=mysql -n task-app --timeout=5m

                      # 2. Run Initial Migration
                      echo "🚀 Running Initial Migration..."
                      sed -i "s|image: .*|image: ${APP_IMAGE}|" k8s/migration-job.yaml
                      kubectl delete job laravel-migration -n task-app --ignore-not-found
                      kubectl apply -f k8s/migration-job.yaml
                      kubectl wait --for=condition=complete job/laravel-migration -n task-app --timeout=5m || {
                          echo "❌ Migration failed! Debug info:"
                          kubectl describe job/laravel-migration -n task-app
                          kubectl logs job/laravel-migration -n task-app || echo "No logs found"
                          kubectl get pods -n task-app
                          exit 1
                      }
                      
                      kubectl apply -f k8s/deployment.yaml
                      kubectl apply -f k8s/service.yaml
                      
                      echo "Waiting for initial deployment..."
                      kubectl wait --for=condition=Available deployment/task-app -n task-app --timeout=5m
                  else
                      echo "Namespace exists, performing rolling update..."
                      # Update ConfigMap first
                      kubectl apply -f k8s/nginx-configmap.yaml
                      
                      # 1. Run Migration Job FIRST (Fixes first-deploy deadlock)
                      echo "🚀 Running Database Migrations (Pre-Rollout)..."
                      
                      # Update image in migration job file
                      sed -i "s|image: .*|image: ${APP_IMAGE}|" k8s/migration-job.yaml
                      
                      # Delete old job if exists
                      kubectl delete job laravel-migration -n task-app --ignore-not-found
                      
                      # Trigger new migration job
                      kubectl apply -f k8s/migration-job.yaml
                      
                      # Wait for migration to complete
                      kubectl wait --for=condition=complete job/laravel-migration -n task-app --timeout=5m || {
                          echo "❌ Migration failed! Checking logs..."
                          kubectl logs job/laravel-migration -n task-app
                          exit 1
                      }
                      echo "✅ Migrations completed successfully."

                      # 3. Apply Manifests (Ensure Deployment exists) & Update Image
                      echo "🔄 Applying manifests to ensure Deployment exists..."
                      kubectl apply -f k8s/
                      
                      # 4. Update Image
                      kubectl set image deployment/task-app \
                        app=${APP_IMAGE} \
                        nginx=${NGINX_IMAGE} \
                        -n task-app
                  fi

                  # Wait for rollout to complete (zero-downtime)
                  echo "Waiting for zero-downtime rolling update..."
                  kubectl rollout status deployment/task-app -n task-app --timeout=5m || {
                      echo "❌ Deployment failed! Checking logs..."
                      kubectl logs -l app=task-app -n task-app --all-containers=true --tail=50
                      kubectl describe pod -l app=task-app -n task-app
                      exit 1
                  }

                  # Verify deployment
                  echo "Verifying deployment..."
                  kubectl get pods -n task-app

                  echo "Deployment completed successfully! ✅"

            - name: Rollback on Failure
              if: failure()
              run: |
                  echo "Deployment failed! Rolling back..."
                  kubectl rollout undo deployment/task-app -n task-app
                  kubectl rollout status deployment/task-app -n task-app
