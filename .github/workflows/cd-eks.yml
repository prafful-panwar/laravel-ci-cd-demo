name: CD - Deploy to EKS

on:
    workflow_run:
        workflows: ['CI - Build and Push Docker Images']
        types:
            - completed

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        permissions:
            contents: read
        concurrency:
            group: ${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true
        environment: production

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Validate AWS credentials and permissions
              run: |
                  echo "🔐 Validating AWS credentials..."

                  # Test AWS connection
                  if ! aws sts get-caller-identity; then
                      echo "❌ Failed to authenticate with AWS. Check your credentials."
                      exit 1
                  fi

                  echo "✅ AWS authentication successful"
                  echo "Account: $(aws sts get-caller-identity --query Account --output text)"
                  echo "User/Role: $(aws sts get-caller-identity --query Arn --output text)"

                  # Test EKS permissions
                  echo ""
                  echo "🔍 Checking EKS permissions..."
                  if ! aws eks describe-cluster --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }} &>/dev/null; then
                      echo "⚠️  Warning: Cannot access EKS cluster. This could be due to:"
                      echo "  - Cluster doesn't exist yet"
                      echo "  - Insufficient IAM permissions"
                      echo "  - Incorrect cluster name or region"
                  else
                      echo "✅ EKS access verified"
                  fi

            - name: Check EKS cluster status
              id: cluster-check
              run: |
                  CLUSTER_STATUS=$(aws eks describe-cluster --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }} --query 'cluster.status' --output text 2>/dev/null || echo "NOT_FOUND")
                  echo "Cluster status: $CLUSTER_STATUS"

                  if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
                      echo "❌ EKS cluster is not ready (status: $CLUSTER_STATUS)"
                      echo "Please wait for cluster creation to complete, then re-run this workflow."
                      exit 1
                  fi

                  echo "✅ EKS cluster is ready"

            - name: Configure kubectl
              run: |
                  echo "⚙️  Configuring kubectl for EKS cluster..."
                  aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}
                  kubectl version --client

                  echo ""
                  echo "🔍 Testing kubectl access to cluster..."
                  if ! kubectl auth can-i get pods -n kube-system 2>/dev/null; then
                      echo ""
                      echo "❌ ERROR: kubectl cannot access the EKS cluster!"
                      echo ""
                      echo "The GitHub Actions IAM user/role needs permission to access this cluster."
                      echo ""
                      echo "To fix this, run these commands locally:"
                      echo ""
                      echo "# 1. Get the IAM ARN that GitHub Actions is using:"
                      echo "IAM_ARN=\"$(aws sts get-caller-identity --query Arn --output text)\""
                      echo "echo \"GitHub Actions IAM ARN: \$IAM_ARN\""
                      echo ""
                      echo "# 2. Add this IAM user/role to your EKS cluster:"
                      echo "eksctl create iamidentitymapping \\"
                      echo "  --cluster ${{ secrets.EKS_CLUSTER_NAME }} \\"
                      echo "  --region ${{ secrets.AWS_REGION }} \\"
                      echo "  --arn \"\$IAM_ARN\" \\"
                      echo "  --group system:masters \\"
                      echo "  --username github-actions"
                      echo ""
                      echo "Or manually edit the aws-auth ConfigMap:"
                      echo "kubectl edit configmap aws-auth -n kube-system"
                      echo ""
                      exit 1
                  fi

                  echo "✅ kubectl access verified!"

            - name: Deploy to EKS with Zero-Downtime Rolling Update
              env:
                  APP_IMAGE: ${{ secrets.DOCKER_USERNAME }}/task-app-ci-cd-demo:${{ github.sha }}
                  NGINX_IMAGE: ${{ secrets.DOCKER_USERNAME }}/task-app-nginx:${{ github.sha }}
              run: |
                  echo "Deploying new image: ${APP_IMAGE}"

                  # Create namespace if it doesn't exist
                  if ! kubectl get namespace task-app &>/dev/null; then
                      echo "Creating namespace and initial resources..."
                      kubectl apply -f k8s/namespace.yaml
                      kubectl apply -f k8s/nginx-configmap.yaml
                      kubectl apply -f k8s/mysql-pvc.yaml
                      kubectl apply -f k8s/mysql-statefulset.yaml
                      kubectl apply -f k8s/deployment.yaml
                      kubectl apply -f k8s/service.yaml
                      
                      echo "Waiting for initial deployment..."
                      kubectl wait --for=condition=Available deployment/task-app -n task-app --timeout=5m
                  else
                      echo "Namespace exists, performing rolling update..."
                      # Update ConfigMap first (in case nginx config changed)
                      kubectl apply -f k8s/nginx-configmap.yaml
                      
                      # Update deployment with new image (rolling update)
                      kubectl set image deployment/task-app \
                        app=${APP_IMAGE} \
                        nginx=${NGINX_IMAGE} \
                        -n task-app
                  fi

                  # Wait for rollout to complete (zero-downtime)
                  echo "Waiting for zero-downtime rolling update..."
                  kubectl rollout status deployment/task-app -n task-app --timeout=5m

                  # Verify deployment
                  echo "Verifying deployment..."
                  kubectl get pods -n task-app

                  # Run migrations
                  echo "Running database migrations..."
                  POD_NAME=$(kubectl get pods -n task-app -l app=task-app -o jsonpath='{.items[0].metadata.name}')
                  kubectl exec -n task-app ${POD_NAME} -c app -- php artisan migrate --force

                  echo "Deployment completed successfully! ✅"

            - name: Rollback on Failure
              if: failure()
              run: |
                  echo "Deployment failed! Rolling back..."
                  kubectl rollout undo deployment/task-app -n task-app
                  kubectl rollout status deployment/task-app -n task-app
