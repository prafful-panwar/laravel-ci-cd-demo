version: '3.8'

services:
    app:
        image: praffulpanwar2016/task-app-ci-cd-demo:latest
        platform: linux/amd64
        container_name: task-app-ci-cd-demo-app-hub
        restart: unless-stopped
        working_dir: /var/www
        depends_on:
            - db
        environment:
            APP_URL: http://${APP_HOST}:${APP_PORT}
            CORS_ALLOWED_ORIGINS: http://${APP_HOST}:${APP_PORT}
            SANCTUM_STATEFUL_DOMAINS: ${APP_HOST}:${APP_PORT}
            APP_KEY: base64:2fl+Ktvkfl+Frkxvry1vF+I5/1G5Q/5K5+555555555=
            APP_DEBUG: true
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: task-app-ci-cd-demo
            DB_USERNAME: laravel
            DB_PASSWORD: password
        networks:
            - task-app-ci-cd-demo-network-hub

    web:
        image: praffulpanwar2016/task-app-nginx:latest
        platform: linux/amd64
        container_name: task-app-ci-cd-demo-web-hub
        restart: unless-stopped
        ports:
            - '${APP_PORT}:80'
        depends_on:
            - app
        networks:
            - task-app-ci-cd-demo-network-hub

    db:
        image: mysql:8.0
        container_name: task-app-ci-cd-demo-db-hub
        restart: unless-stopped
        ports:
            - '3308:3306'
        environment:
            MYSQL_DATABASE: task-app-ci-cd-demo
            MYSQL_USER: laravel
            MYSQL_PASSWORD: password
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - dbdata-hub:/var/lib/mysql
        networks:
            - task-app-ci-cd-demo-network-hub

networks:
    task-app-ci-cd-demo-network-hub:
        driver: bridge

volumes:
    dbdata-hub:
